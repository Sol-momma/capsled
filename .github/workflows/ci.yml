name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    steps:
      # Pin the action commit so a mutable tag cannot change code executed by CI.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build release executable
        run: swift build --configuration release

      - name: Check command parser
        run: |
          swiftc Sources/CapsLEDCore/Command.swift Checks/CommandParserCheck.swift \
            -o .build/capsled-parser-check
          .build/capsled-parser-check

      - name: Check distribution scripts
        run: |
          sh -n install.sh
          bash -n scripts/build-release.sh
