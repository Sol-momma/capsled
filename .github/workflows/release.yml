name: Release

on:
  push:
    tags:
      - "v*"

# The release job needs no repository write access beyond creating the release
# and uploading its checksum-protected assets.
permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      # Pin the action commit so a mutable tag cannot change code executed by CI.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build Universal Binary and checksum
        run: scripts/build-release.sh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            .build/distribution/capsled-macos-universal.tar.gz \
            .build/distribution/capsled-macos-universal.tar.gz.sha256 \
            --verify-tag \
            --generate-notes \
            --title "capsled $GITHUB_REF_NAME"
